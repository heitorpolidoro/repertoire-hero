name: "Node.js CI"

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    uses: heitorpolidoro/.github/.github/workflows/node-ci.yml@master
    with:
      node-versions: "['24.x']"
      sonar-node-version: "24.x"
      database: supabase
    secrets: inherit # pragma: allowlist secret

  e2e:
    name: "E2E Tests (Playwright)"
    runs-on: ubuntu-latest
    needs: [] # run in parallel with build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: repertoire_hero_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/repertoire_hero_test"
      BETTER_AUTH_SECRET: "ci-e2e-secret-32-chars-minimum-ok"
      BETTER_AUTH_URL: "http://127.0.0.1:3000"
      # Disable Sentry in CI to keep logs clean
      NEXT_PUBLIC_SENTRY_DSN: ""
      SENTRY_DSN: ""
      # Disable auto-login bypass — tests use real auth
      NEXT_PUBLIC_AUTO_LOGIN: "false"
      E2E_USER_EMAIL: "e2e-test@example.com"
      E2E_USER_PASSWORD: "E2eTestPassword1!"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: "http://127.0.0.1:3000"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
