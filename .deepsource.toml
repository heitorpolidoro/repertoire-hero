version = 1

[[analyzers]]
name = "javascript"
enabled = true
  [analyzers.meta]
    environment = ["browser", "node"]
    plugins = ["react"]
    skip_doc_coverage = ["arrow-function"]
    cyclomatic_complexity_threshold = "very-high"

[[analyzers]]
name = "secrets"
enabled = true

[[analyzers]]
name = "test-coverage"
enabled = true

[[analyzers]]
name = "docker"
enabled = true
